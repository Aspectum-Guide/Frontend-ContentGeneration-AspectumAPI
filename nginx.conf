server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — this is an admin panel (bookings, prices, LLM keys),
    # worth the defense-in-depth even without a public-facing threat model yet.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.aspectum-guide.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Sourcemaps are built as "hidden" (see vite.config.js) so the bundle never
    # references them, but block direct access too in case they end up in dist/.
    location ~* \.map$ {
        deny all;
    }

    # Cache hashed build assets aggressively; index.html itself must revalidate
    # so deploys are picked up without a manual cache bust.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown paths (client-side routes) serve index.html instead of 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
