services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "17000:17000"
    environment:
      - VITE_API_URL=https://dev.aspectum-guide.com/api/v1
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped
